# https://taskfile.dev

version: '3'

vars:
  GOWORK: off
  WIKI_DIR: "{{.WIKI_DIR | default \".wiki\"}}"

tasks:
  default:
    desc: Run the basic demo
    cmd: go run examples/basic/main.go
    env:
      WIKI_DIR: "{{.WIKI_DIR}}"

  demo:
    desc: Run the basic demo
    cmd: go run examples/basic/main.go
    env:
      WIKI_DIR: "{{.WIKI_DIR}}"

  demo:mock:
    desc: Run demo with Mock LLM (no API key required)
    cmd: go run examples/basic/main.go
    env:
      OPENAI_API_KEY: ""
      WIKI_DIR: "{{.WIKI_DIR}}"

  demo:openai:
    desc: Run demo with OpenAI (requires OPENAI_API_KEY)
    cmd: go run examples/basic/main.go
    env:
      WIKI_DIR: "{{.WIKI_DIR}}"
      OPENAI_API_KEY: "{{.OPENAI_API_KEY}}"
      OPENAI_MODEL: "{{.OPENAI_MODEL}}"
      OPENAI_BASE_URL: "{{.OPENAI_BASE_URL}}"

  demo:custom:
    desc: Run demo with custom OpenAI-compatible endpoint
    cmd: go run examples/basic/main.go
    env:
      WIKI_DIR: "{{.WIKI_DIR}}"
      OPENAI_API_KEY: "{{.CUSTOM_API_KEY}}"
      OPENAI_BASE_URL: "{{.CUSTOM_BASE_URL}}"
      OPENAI_MODEL: "{{.CUSTOM_MODEL}}"

  clean:
    desc: Remove the wiki directory
    cmd: rm -rf "{{.WIKI_DIR}}"

  build:
    desc: Build the basic demo
    cmd: go build -o bin/basic examples/basic/main.go

  run:
    desc: Build and run the basic demo
    cmd: |
      go build -o bin/basic examples/basic/main.go
      ./bin/basic
    env:
      WIKI_DIR: "{{.WIKI_DIR}}"

  # CLI tasks
  cli:build:
    desc: Build the CLI binary
    cmd: go build -o bin/wiki ./cmd/wiki

  cli:
    desc: Run CLI (builds first if needed)
    cmd: |
      if [ ! -f bin/wiki ]; then
        go build -o bin/wiki ./cmd/wiki
      fi
      ./bin/wiki "{{.CLI_ARGS}}"

  cli:ingest:
    desc: Ingest content via CLI
    cmd: ./bin/wiki --wiki-dir "{{.WIKI_DIR}}" --open-ai-key "{{.OPENAI_API_KEY}}" --open-ai-base-url "{{.OPENAI_BASE_URL}}" --open-ai-model "{{.OPENAI_MODEL}}" ingest "{{.PATH}}"
    vars:
      PATH: "{{.PATH}}"
      OPENAI_API_KEY: "{{.CUSTOM_API_KEY}}"
      OPENAI_BASE_URL: "{{.CUSTOM_BASE_URL}}"
      OPENAI_MODEL: "{{.CUSTOM_MODEL}}"

  cli:ask:
    desc: Ask wiki a question via CLI
    cmd: ./bin/wiki --wiki-dir "{{.WIKI_DIR}}" --open-ai-key "{{.OPENAI_API_KEY}}" --open-ai-base-url "{{.OPENAI_BASE_URL}}" --open-ai-model "{{.OPENAI_MODEL}}" ask "{{.QUESTION}}"
    vars:
      OPENAI_API_KEY: "{{.CUSTOM_API_KEY}}"
      OPENAI_BASE_URL: "{{.CUSTOM_BASE_URL}}"
      OPENAI_MODEL: "{{.CUSTOM_MODEL}}"

  # Benchmark tasks (now uses config file for settings)
  benchmark:init:
    desc: Initialize benchmark config file
    cmd: ./bin/wiki cfg --init

  benchmark:show:
    desc: Show current benchmark configuration
    cmd: ./bin/wiki cfg --show

  locomo:
    desc: Run LoCoMo benchmark (uses config file settings)
    cmds:
      - task: cli:build
      - ./bin/wiki benchmark --dataset locomo
    vars:
      CUSTOM_API_KEY: "{{.CUSTOM_API_KEY}}"

  locomo:mock:
    desc: Run LoCoMo benchmark with mock embeddings (overrides config)
    cmds:
      - task: cli:build
      - ./bin/wiki benchmark --dataset locomo --data-path .benchmark/locomo10.json